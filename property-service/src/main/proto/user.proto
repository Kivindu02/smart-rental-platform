syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.sp.user";
option java_outer_classname = "UserProto";

service UserService {
  rpc GetUserById (UserRequest) returns (UserResponse);
}

message UserRequest {
  string  userId = 1;
}

message UserResponse {
  string id = 1;
  string firstName = 2;
  string lastName = 3;
  string email = 4;
  string phoneNo = 5;
  string role = 6;
}