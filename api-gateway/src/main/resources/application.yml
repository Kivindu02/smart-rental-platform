server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://auth-service:4001
              predicates:
                - Path=/auth/**

            - id: property-service
              uri: http://property-service:4000
              predicates:
                - Path=/property/**

            - id: review-service
              uri: http://review-service:4003
              predicates:
                - Path=/reviews/**