apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-service
  namespace: smart-rental
spec:
  replicas: 1
  selector:
    matchLabels:
      app: property-service
  template:
    metadata:
      labels:
        app: property-service
    spec:
      containers:
        - name: property-service
          image: kivindu744/property-service:latest
          ports:
            - containerPort: 4000
            - containerPort: 9002
          env:
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: app-secrets, key: JWT_SECRET } }
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom: { secretKeyRef: { name: app-secrets, key: CLOUDINARY_CLOUD_NAME } }
            - name: CLOUDINARY_API_KEY
              valueFrom: { secretKeyRef: { name: app-secrets, key: CLOUDINARY_API_KEY } }
            - name: CLOUDINARY_API_SECRET
              valueFrom: { secretKeyRef: { name: app-secrets, key: CLOUDINARY_API_SECRET } }
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://property-service-db:5432/db"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: app-secrets, key: PROPERTY_DB_USER } }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: app-secrets, key: PROPERTY_DB_PASSWORD } }
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SPRING_SQL_INIT_MODE
              value: "always"
---
apiVersion: v1
kind: Service
metadata:
  name: property-service
  namespace: smart-rental
spec:
  selector:
    app: property-service
  ports:
    - name: http
      port: 4000
      targetPort: 4000
    - name: grpc
      port: 9002
      targetPort: 9002
