apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-service-db
  namespace: smart-rental
spec:
  replicas: 1
  selector:
    matchLabels:
      app: property-service-db
  template:
    metadata:
      labels:
        app: property-service-db
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: app-secrets, key: PROPERTY_DB_USER }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: app-secrets, key: PROPERTY_DB_PASSWORD }
---
apiVersion: v1
kind: Service
metadata:
  name: property-service-db
  namespace: smart-rental
spec:
  selector:
    app: property-service-db
  ports:
    - port: 5432
      targetPort: 5432
