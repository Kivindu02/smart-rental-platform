apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: smart-rental
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: kivindu744/auth-service:latest
          ports:
            - containerPort: 4001
            - containerPort: 9001
          env:
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: app-secrets, key: JWT_SECRET } }
            - name: MAIL_HOST
              valueFrom: { secretKeyRef: { name: app-secrets, key: MAIL_HOST } }
            - name: MAIL_PORT
              valueFrom: { secretKeyRef: { name: app-secrets, key: MAIL_PORT } }
            - name: MAIL_USERNAME
              valueFrom: { secretKeyRef: { name: app-secrets, key: MAIL_USERNAME } }
            - name: MAIL_PASSWORD
              valueFrom: { secretKeyRef: { name: app-secrets, key: MAIL_PASSWORD } }
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://auth-service-db:5432/db"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: app-secrets, key: AUTH_DB_USER } }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: app-secrets, key: AUTH_DB_PASSWORD } }
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SPRING_SQL_INIT_MODE
              value: "always"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: smart-rental
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 4001
      targetPort: 4001
    - name: grpc
      port: 9001
      targetPort: 9001
